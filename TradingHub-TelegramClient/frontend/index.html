<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingHub - Telegram Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .step::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #e0e0e0;
            z-index: -1;
        }

        .step:first-child::before {
            display: none;
        }

        .step-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .step.active .step-number {
            background: #667eea;
            color: white;
        }

        .step.completed .step-number {
            background: #10b981;
            color: white;
        }

        .step-label {
            font-size: 12px;
            color: #999;
        }

        .step.active .step-label {
            color: #667eea;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .alert-success {
            background: #d1fae5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }

        .alert-info {
            background: #dbeafe;
            border: 1px solid #bfdbfe;
            color: #1e40af;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .help-text {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }

        .hidden {
            display: none;
        }

        #screen-1, #screen-2, #screen-3 {
            display: none;
        }

        #screen-1.active, #screen-2.active, #screen-3.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🚀 TradingHub</h1>
            <p>Automated Trading Signal Copier</p>
        </div>

        <div class="step-indicator">
            <div class="step active" id="step-1">
                <div class="step-number">1</div>
                <div class="step-label">API Key</div>
            </div>
            <div class="step" id="step-2">
                <div class="step-number">2</div>
                <div class="step-label">Phone Auth</div>
            </div>
            <div class="step" id="step-3">
                <div class="step-number">3</div>
                <div class="step-label">Channels</div>
            </div>
        </div>

        <div id="alert-container"></div>

        <!-- Screen 1: API Key -->
        <div id="screen-1" class="active">
            <div class="form-group">
                <label for="api-key">TradingHub API Key</label>
                <input type="text" id="api-key" placeholder="Enter your API key">
                <div class="help-text">Get this from your TradingHub dashboard</div>
            </div>
            <button class="btn btn-primary" onclick="validateApiKey()">Continue</button>
        </div>

        <!-- Screen 2: Phone Authentication -->
        <div id="screen-2">
            <div class="form-group">
                <label for="phone-number">Phone Number</label>
                <input
                    type="tel"
                    id="phone-number"
                    name="phone"
                    placeholder="+1234567890"
                    required
                    pattern="^\+[1-9]\d{1,14}$"
                    maxlength="16"
                >
                <div class="help-text">International format (e.g., +1234567890)</div>
            </div>
            <button class="btn btn-primary" onclick="sendOtp()" id="send-otp-btn">Send OTP</button>

            <div id="otp-section" class="hidden">
                <div class="form-group">
                    <label for="otp-code">Enter OTP Code</label>
                    <input type="text" id="otp-code" placeholder="12345" maxlength="5">
                    <div class="help-text">Check your Telegram app</div>
                </div>
                <button class="btn btn-primary" onclick="verifyOtp()">Verify Code</button>
            </div>

            <div id="password-section" class="hidden">
                <div class="form-group">
                    <label for="password-2fa">2FA Password</label>
                    <input type="password" id="password-2fa" placeholder="Enter your 2FA password">
                    <div class="help-text">Your Telegram two-step verification password</div>
                </div>
                <button class="btn btn-primary" onclick="verify2FA()">Verify Password</button>
            </div>
        </div>

        <!-- Screen 3: Channel Selection -->
        <div id="screen-3">
            <p style="margin-bottom: 20px; color: #666;">Loading your Telegram channels...</p>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Please wait...</p>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let apiKey = '';
        let phoneNumber = '';
        let sessionString = '';

        function showAlert(message, type = 'error') {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        function showLoading(show = true) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function setStep(step) {
            // Hide all screens
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('[id^="step-"]').forEach(s => {
                s.classList.remove('active');
                s.classList.remove('completed');
            });

            // Show current screen
            document.getElementById(`screen-${step}`).classList.add('active');
            document.getElementById(`step-${step}`).classList.add('active');

            // Mark previous steps as completed
            for (let i = 1; i < step; i++) {
                document.getElementById(`step-${i}`).classList.add('completed');
            }

            currentStep = step;
        }

        async function validateApiKey() {
            const input = document.getElementById('api-key').value.trim();
            
            if (!input) {
                showAlert('Please enter your API key');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch('/api/validate-api-key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: input })
                });

                const data = await response.json();

                if (data.success) {
                    apiKey = input;
                    phoneNumber = data.phone_number;
                    document.getElementById('phone-number').value = phoneNumber;
                    showAlert('API key validated!', 'success');
                    setTimeout(() => setStep(2), 1000);
                } else {
                    showAlert(data.error || 'Invalid API key');
                }
            } catch (error) {
                showAlert('Could not connect to server. Please check your connection.');
            } finally {
                showLoading(false);
            }
        }

        async function sendOtp() {
            // Get phone number from input field (user can modify it)
            const phoneInput = document.getElementById('phone-number').value.trim();

            if (!phoneInput) {
                showAlert('Please enter your phone number');
                return;
            }

            // Validate phone format
            if (!phoneInput.startsWith('+')) {
                showAlert('Phone number must start with + (e.g., +1234567890)');
                return;
            }

            // Update the phoneNumber variable
            phoneNumber = phoneInput;

            showLoading(true);

            try {
                console.log('Sending OTP to:', phoneNumber);
                const response = await fetch('/api/auth/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number: phoneNumber })
                });
                console.log('Response status:', response.status);

                const data = await response.json();

                if (data.success) {
                    showAlert('OTP sent to your Telegram!', 'success');
                    document.getElementById('send-otp-btn').classList.add('hidden');
                    document.getElementById('otp-section').classList.remove('hidden');
                } else {
                    showAlert(data.error || 'Failed to send OTP');
                }
            } catch (error) {
                showAlert('Connection error. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        async function verifyOtp() {
            const code = document.getElementById('otp-code').value.trim();

            if (!code) {
                showAlert('Please enter the OTP code');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch('/api/auth/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();

                if (data.success) {
                    sessionString = data.session_string;
                    showAlert('Authenticated successfully!', 'success');
                    setTimeout(() => loadChannels(), 1000);
                } else if (data.needs_password) {
                    document.getElementById('otp-section').classList.add('hidden');
                    document.getElementById('password-section').classList.remove('hidden');
                    showAlert('Please enter your 2FA password', 'info');
                } else {
                    showAlert(data.error || 'Invalid code');
                }
            } catch (error) {
                showAlert('Verification failed. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        async function verify2FA() {
            const password = document.getElementById('password-2fa').value;

            if (!password) {
                showAlert('Please enter your 2FA password');
                return;
            }

            showLoading(true);

            try {
                const response = await fetch('/api/auth/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    sessionString = data.session_string;
                    showAlert('2FA verified!', 'success');
                    setTimeout(() => loadChannels(), 1000);
                } else {
                    showAlert(data.error || 'Invalid password');
                }
            } catch (error) {
                showAlert('Verification failed. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        async function loadChannels() {
            setStep(3);
            showLoading(true);

            try {
                const response = await fetch('/api/channels/list');
                const data = await response.json();

                if (data.success) {
                    displayChannels(data.channels);
                } else {
                    showAlert(data.error || 'Failed to load channels');
                }
            } catch (error) {
                showAlert('Could not load channels. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        function displayChannels(channels) {
            const screen = document.getElementById('screen-3');
            
            let html = `
                <p style="margin-bottom: 20px; color: #666;">
                    Select channels to monitor for trading signals:
                </p>
                <div style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
            `;

            channels.forEach(channel => {
                html += `
                    <label style="display: flex; align-items: center; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px; cursor: pointer;">
                        <input type="checkbox" value="${channel.id}" data-title="${channel.title}" data-username="${channel.username || ''}" style="width: auto; margin-right: 10px;">
                        <div>
                            <div style="font-weight: 500;">${channel.title}</div>
                            <div style="font-size: 12px; color: #666;">
                                ${channel.username ? '@' + channel.username : 'Private'}
                                · ${channel.type}
                            </div>
                        </div>
                    </label>
                `;
            });

            html += `
                </div>
                <button class="btn btn-primary" onclick="activateTrading()">Activate Trading</button>
            `;

            screen.innerHTML = html;
        }

        async function activateTrading() {
            const checkboxes = document.querySelectorAll('#screen-3 input[type="checkbox"]:checked');
            
            if (checkboxes.length === 0) {
                showAlert('Please select at least one channel');
                return;
            }

            const selectedChannels = Array.from(checkboxes).map(cb => ({
                id: cb.value,
                title: cb.dataset.title,
                username: cb.dataset.username
            }));

            showLoading(true);

            try {
                const response = await fetch('/api/session/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ selected_channels: selectedChannels })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess(selectedChannels.length);
                } else {
                    showAlert(data.error || 'Upload failed');
                }
            } catch (error) {
                showAlert('Could not upload session. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        function showSuccess(channelCount) {
            const container = document.querySelector('.container');
            container.innerHTML = `
                <div style="text-align: center; padding: 40px 0;">
                    <div style="font-size: 80px; margin-bottom: 20px;">✅</div>
                    <h2 style="color: #10b981; margin-bottom: 10px;">Setup Complete!</h2>
                    <p style="color: #666; margin-bottom: 30px;">
                        Your TradingHub is now monitoring ${channelCount} channel(s) 24/7
                    </p>
                    <div style="background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 20px; margin-bottom: 20px; text-align: left;">
                        <h3 style="color: #166534; margin-bottom: 10px;">✨ What's Next?</h3>
                        <ul style="color: #166534; line-height: 1.8;">
                            <li>Close this window</li>
                            <li>Install MT4/MT5 EA from your dashboard</li>
                            <li>Trading will start automatically!</li>
                        </ul>
                    </div>
                    <button class="btn btn-primary" onclick="window.close()">Close</button>
                </div>
            `;
        }
    </script>
</body>
</html>
